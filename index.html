<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizador del Cali</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 24px;
  --sp-6: 32px;

  --font-sans: "Inter", system-ui, -apple-system, sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, monospace;

  --text-xs: 11px;
  --text-sm: 12px;
  --text-base: 14px;
  --text-md: 15px;
  --text-lg: 17px;
  --text-xl: 20px;
  --text-2xl: 28px;
  --text-3xl: clamp(40px, 6vw, 56px);
  --text-label: 12px;
  --text-subtitle: 14px;
  --leading-tight: 1.2;
  --leading-snug: 1.35;
  --leading-body: 1.55;

  --radius-sm: 6px;
  --radius: 8px;
  --radius-lg: 10px;
  --radius-pill: 9999px;

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.35);

  --bg: #0a0a0c;
  --bg-elevated: #111114;
  --surface: rgba(255, 255, 255, 0.03);
  --surface-hover: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.12);
  --text: #fafafa;
  --muted: #a1a1aa;
  --dim: #52525b;

  --blue: #60a5fa;
  --blue2: #3b82f6;
  --violet: #a78bfa;
  --violet2: #8b5cf6;
  --teal: #34d399;
  --amber: #fbbf24;
  --rose: #f87171;

  --accent: var(--blue);
  --accent2: var(--violet);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: var(--leading-body);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 1040px;
  margin: 0 auto;
  padding: var(--sp-6) var(--sp-5) calc(var(--sp-6) * 3);
}

.focus-shell {
  max-width: 560px;
  margin: 0 auto;
  padding: var(--sp-5) var(--sp-4) var(--sp-6);
}

.hdr {
  text-align: center;
  margin-bottom: var(--sp-5);
}

.hdr-title {
  font-size: var(--text-xl);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: var(--leading-tight);
  color: var(--text);
  margin-bottom: var(--sp-2);
}

.hdr-sub {
  font-size: var(--text-subtitle);
  color: var(--muted);
  font-weight: 400;
}

.hdr-meta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-3);
  margin-top: var(--sp-3);
  flex-wrap: wrap;
}

.hdr-date {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  color: var(--muted);
}

.sync-badge {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  padding: var(--sp-1) var(--sp-3);
  border-radius: var(--radius-pill);
  font-weight: 500;
}
.sync-badge.ok {
  background: rgba(52, 211, 153, 0.1);
  color: var(--teal);
  border: 1px solid rgba(52, 211, 153, 0.22);
}
.sync-badge.err {
  background: rgba(248, 113, 113, 0.1);
  color: var(--rose);
  border: 1px solid rgba(248, 113, 113, 0.22);
}
.sync-badge.loading {
  background: var(--surface);
  color: var(--muted);
  border: 1px solid var(--border);
}

.pomo-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: var(--sp-2) 0 var(--sp-4);
}

.pomo-modes {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: var(--sp-1);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  padding: var(--sp-1);
  margin-bottom: var(--sp-5);
}

.pomo-mode-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  font-weight: 500;
  padding: var(--sp-2) var(--sp-4);
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.pomo-mode-btn.active {
  background: var(--bg-elevated);
  color: var(--text);
  border: 1px solid var(--border-strong);
  box-shadow: var(--shadow-sm);
}
.pomo-mode-btn:not(.active):hover {
  color: var(--text);
}

.pomo-duration-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: var(--sp-2);
  margin-bottom: var(--sp-4);
}
.pomo-dur-label {
  font-size: var(--text-label);
  color: var(--muted);
  font-weight: 500;
}
.pomo-dur-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  padding: var(--sp-1) var(--sp-3);
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.pomo-dur-btn.active {
  border-color: var(--border-strong);
  color: var(--text);
  background: var(--surface);
}
.pomo-dur-btn:not(.active):hover {
  color: var(--text);
  border-color: var(--border-strong);
}

.pomo-focus-badge {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  padding: var(--sp-2) var(--sp-3);
  font-size: var(--text-label);
  font-weight: 500;
  color: var(--muted);
  margin-bottom: var(--sp-5);
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.25s, transform 0.25s;
}
.pomo-focus-badge.visible {
  opacity: 1;
  transform: translateY(0);
}
.pomo-focus-badge .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--blue);
}

.pomo-ring-wrap {
  position: relative;
  width: min(300px, 88vw);
  height: min(300px, 88vw);
  margin-bottom: var(--sp-5);
}

.pomo-ring-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.ring-bg {
  fill: none;
  stroke: rgba(255, 255, 255, 0.06);
  stroke-width: 5;
}

.ring-progress {
  fill: none;
  stroke: url(#ringGrad);
  stroke-width: 5;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.pomo-inner {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
}

.pomo-time {
  font-family: var(--font-mono);
  font-size: var(--text-3xl);
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: var(--leading-tight);
  color: var(--text);
  font-variant-numeric: tabular-nums;
  transition: color 0.2s;
}
.pomo-time.running {
  color: var(--text);
}

.pomo-phase-label {
  font-size: var(--text-label);
  color: var(--muted);
  font-weight: 500;
  max-width: 16em;
  text-align: center;
}

.pomo-controls {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  flex-wrap: wrap;
  justify-content: center;
}

.pomo-btn {
  border: none;
  cursor: pointer;
  border-radius: var(--radius-pill);
  font-family: var(--font-sans);
  font-weight: 500;
  transition: background 0.15s, border-color 0.15s, opacity 0.15s;
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

.pomo-btn-main {
  background: var(--text);
  color: var(--bg);
  font-size: var(--text-md);
  padding: var(--sp-3) var(--sp-6);
}
.pomo-btn-main:hover {
  opacity: 0.92;
}
.pomo-btn-main:active {
  opacity: 0.85;
}

.pomo-btn-sec {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: var(--text-base);
  padding: var(--sp-3) var(--sp-4);
}
.pomo-btn-sec:hover {
  background: var(--surface);
  color: var(--text);
  border-color: var(--border-strong);
}

.pomo-sessions {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  margin-top: var(--sp-5);
  flex-wrap: wrap;
  justify-content: center;
}
.pomo-sessions-label {
  font-size: var(--text-label);
  color: var(--muted);
  font-weight: 500;
}
.pomo-dots {
  display: flex;
  gap: var(--sp-2);
}
.pomo-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--dim);
  transition: background 0.2s;
}
.pomo-dot.done {
  background: var(--blue);
}

.text-mono-muted {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--muted);
}

.journal-loading {
  text-align: center;
  padding: var(--sp-6) var(--sp-5);
  color: var(--muted);
  font-size: var(--text-base);
}

.journal-shell {
  margin-top: var(--sp-6);
  padding-top: var(--sp-6);
  border-top: 1px solid var(--border);
}

.section-heading {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--muted);
  margin-bottom: var(--sp-4);
  letter-spacing: 0;
}

.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: var(--sp-5);
  align-items: start;
}
@media (max-width: 760px) {
  .layout {
    grid-template-columns: 1fr;
    gap: var(--sp-5);
  }
}

.cal-wrap {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: sticky;
  top: var(--sp-5);
}
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--border);
}
.cal-nav-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  font-size: var(--text-base);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.cal-nav-btn:hover {
  background: var(--surface);
  color: var(--text);
  border-color: var(--border-strong);
}
.cal-month-lbl {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text);
}
.cal-grid {
  padding: var(--sp-3) var(--sp-3) var(--sp-4);
}
.cal-dow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: var(--sp-1);
  margin-bottom: var(--sp-2);
}
.cal-dow span {
  text-align: center;
  font-size: var(--text-xs);
  color: var(--dim);
  padding: var(--sp-1) 0;
  font-weight: 500;
}
.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: var(--sp-1);
}
.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-sm);
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--muted);
  transition: background 0.15s, color 0.15s;
  position: relative;
  border: 1px solid transparent;
}
.cal-day:hover {
  background: var(--surface);
  color: var(--text);
}
.cal-day.other-month {
  color: var(--dim);
  opacity: 0.35;
}
.cal-day.today {
  font-weight: 600;
  color: var(--blue);
  border-color: rgba(96, 165, 250, 0.35);
  background: rgba(96, 165, 250, 0.08);
}
.cal-day.selected {
  background: var(--text);
  color: var(--bg);
  border-color: transparent;
}
.cal-day.has-entry::after {
  content: "";
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--teal);
}
.cal-day.selected::after {
  background: var(--dim);
}
.cal-footer {
  padding: var(--sp-3) var(--sp-4);
  border-top: 1px solid var(--border);
  display: flex;
  gap: var(--sp-4);
  flex-wrap: wrap;
}
.cal-leg {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-size: var(--text-xs);
  color: var(--muted);
}
.cal-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.journal {
  display: flex;
  flex-direction: column;
  gap: var(--sp-4);
}

.jcard {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color 0.15s;
}
.jcard:hover {
  border-color: var(--border-strong);
}

.jcard-head {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--border);
}
.jcard-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-base);
  flex-shrink: 0;
}
.jcard-title {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text);
  line-height: var(--leading-snug);
}
.jcard-sub {
  font-size: var(--text-xs);
  color: var(--muted);
  margin-top: 2px;
  font-weight: 400;
}
.jcard-body {
  padding: var(--sp-4);
}

.intention-input {
  width: 100%;
  font-family: var(--font-sans);
  font-size: var(--text-lg);
  font-weight: 400;
  color: var(--text);
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  line-height: var(--leading-body);
  min-height: 48px;
}
.intention-input::placeholder {
  color: var(--dim);
}
.intention-rule {
  height: 2px;
  background: var(--border);
  margin-top: var(--sp-3);
  border-radius: 1px;
  overflow: hidden;
}
.intention-fill {
  height: 100%;
  background: var(--blue);
  border-radius: 1px;
  transition: width 0.35s ease;
}

.energy-wrap {
  display: flex;
  gap: var(--sp-2);
  align-items: center;
  flex-wrap: wrap;
}
.energy-btn {
  padding: var(--sp-2) var(--sp-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  font-family: var(--font-sans);
  font-size: var(--text-xs);
  color: var(--muted);
  background: var(--surface);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
}
.energy-btn.on[data-v="1"] {
  color: #f87171;
  background: rgba(248, 113, 113, 0.1);
  border-color: rgba(248, 113, 113, 0.28);
}
.energy-btn.on[data-v="2"] {
  color: #fb923c;
  background: rgba(251, 146, 60, 0.1);
  border-color: rgba(251, 146, 60, 0.28);
}
.energy-btn.on[data-v="3"] {
  color: var(--teal);
  background: rgba(52, 211, 153, 0.1);
  border-color: rgba(52, 211, 153, 0.28);
}
.energy-btn.on[data-v="4"] {
  color: var(--blue);
  background: rgba(96, 165, 250, 0.1);
  border-color: rgba(96, 165, 250, 0.28);
}
.energy-btn.on[data-v="5"] {
  color: var(--violet);
  background: rgba(167, 139, 250, 0.1);
  border-color: rgba(167, 139, 250, 0.28);
}
.energy-note {
  width: 100%;
  margin-top: var(--sp-3);
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: var(--sp-3);
  resize: none;
  outline: none;
  line-height: var(--leading-body);
  min-height: 48px;
}
.energy-note::placeholder {
  color: var(--dim);
}
.energy-note:focus {
  border-color: var(--border-strong);
}

.am2-blocks {
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
}
.am2-blk {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.am2-blk-head {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-2) var(--sp-3);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.am2-blk-num {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--muted);
}
.am2-blk-time {
  font-size: var(--text-xs);
  color: var(--dim);
  margin-left: auto;
  font-family: var(--font-mono);
}
.am2-fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.am2-field {
  padding: var(--sp-3);
  border-right: 1px solid var(--border);
}
.am2-field:last-child {
  border-right: none;
}
.am2-field-lbl {
  font-size: var(--text-xs);
  font-weight: 500;
  color: var(--dim);
  margin-bottom: var(--sp-2);
}
.am2-field textarea {
  width: 100%;
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  color: var(--text);
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  line-height: var(--leading-body);
  min-height: 48px;
}
.am2-field textarea::placeholder {
  color: var(--dim);
}
@media (max-width: 520px) {
  .am2-fields {
    grid-template-columns: 1fr;
  }
  .am2-field {
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .am2-field:last-child {
    border-bottom: none;
  }
}

.err-list {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
  margin-bottom: var(--sp-3);
}
.err-item {
  display: flex;
  gap: var(--sp-3);
  align-items: flex-start;
  padding: var(--sp-3);
  background: rgba(248, 113, 113, 0.06);
  border: 1px solid rgba(248, 113, 113, 0.15);
  border-radius: var(--radius);
}
.err-num {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  font-weight: 500;
  color: rgba(248, 113, 113, 0.45);
  flex-shrink: 0;
  line-height: 1.2;
}
.err-txt {
  flex: 1;
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  color: var(--text);
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  line-height: var(--leading-body);
  min-height: 36px;
}
.err-txt::placeholder {
  color: rgba(248, 113, 113, 0.35);
}
.err-del {
  font-size: var(--text-lg);
  color: rgba(248, 113, 113, 0.4);
  cursor: pointer;
  flex-shrink: 0;
  line-height: 1;
  padding: 0 var(--sp-1);
  transition: color 0.15s;
}
.err-del:hover {
  color: var(--rose);
}
.add-btn {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-3);
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: var(--text-xs);
  font-weight: 500;
  color: var(--muted);
  background: transparent;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.add-btn:hover {
  border-color: var(--rose);
  color: var(--rose);
}

.habit-list {
  display: flex;
  flex-direction: column;
  gap: var(--sp-1);
}
.habit-row {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-2) var(--sp-2);
  border-radius: var(--radius-sm);
  transition: background 0.1s;
}
.habit-row:hover {
  background: var(--surface);
}
.habit-check {
  width: 18px;
  height: 18px;

<!-- Sonido al terminar (AudioContext) -->
<script>
function playDone(){
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,150,300].forEach((delay,i)=>{
      const o=ctx.createOscillator(); const g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine';
      o.frequency.value = [528,660,784][i];
      g.gain.setValueAtTime(0,ctx.currentTime+delay/1000);
      g.gain.linearRampToValueAtTime(.18,ctx.currentTime+delay/1000+.05);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+delay/1000+.6);
      o.start(ctx.currentTime+delay/1000);
      o.stop(ctx.currentTime+delay/1000+.65);
    });
  } catch(e){}
}
</script>

<script>
// ══════════════════════════════════════════════
//  POMODORO ENGINE
// ══════════════════════════════════════════════
const MODES = {
  study: { label: "Estudio", durations: [25, 50], default: 25, color: "#60a5fa" },
  short: { label: "Descanso corto", durations: [5, 10], default: 5, color: "#34d399" },
  long: { label: "Descanso largo", durations: [15, 30], default: 15, color: "#a78bfa" },
};

const CIRCUMFERENCE = 2 * Math.PI * 126; // ≈792

let pomo = {
  mode:       'study',
  duration:   25 * 60, // seconds
  remaining:  25 * 60,
  running:    false,
  interval:   null,
  sessions:   0,
  maxSessions:4,
};

const elTime      = document.getElementById('pomoTime');
const elPhase     = document.getElementById('pomoPhaseLabel');
const elStart     = document.getElementById('pomoStart');
const elReset     = document.getElementById('pomoReset');
const elRing      = document.getElementById('ringProgress');
const elFocus     = document.getElementById('pomoFocusBadge');
const elDots      = document.getElementById('pomoDots');
const elCount     = document.getElementById('pomoSessionCount');
const elDurRow    = document.getElementById('pomoDurRow');
const ringGrad    = document.querySelector('#ringGrad');

function setGradient(mode){
  const m = MODES[mode];
  if(mode==='study'){
    ringGrad.children[0].setAttribute('stop-color','#60a5fa');
    ringGrad.children[1].setAttribute('stop-color','#a78bfa');
  } else if(mode==='short'){
    ringGrad.children[0].setAttribute('stop-color','#34d399');
    ringGrad.children[1].setAttribute('stop-color','#60a5fa');
  } else {
    ringGrad.children[0].setAttribute('stop-color','#a78bfa');
    ringGrad.children[1].setAttribute('stop-color','#c084fc');
  }
}

function fmtTime(s){
  const m = Math.floor(s/60); const sec = s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function updateRing(){
  const pct = pomo.remaining / pomo.duration;
  const offset = CIRCUMFERENCE * (1 - pct);
  elRing.style.strokeDasharray  = CIRCUMFERENCE;
  elRing.style.strokeDashoffset = offset;
}

function renderPomo(){
  elTime.textContent = fmtTime(pomo.remaining);
  updateRing();
  const mode = MODES[pomo.mode];
  if(pomo.running){
    elPhase.textContent = mode.label + " en curso";
    elTime.classList.add('running');
    elStart.textContent = '⏸ Pausar';
    elFocus.classList.toggle('visible', pomo.mode==='study');
  } else {
    elTime.classList.remove('running');
    elStart.textContent = pomo.remaining < pomo.duration ? '▶ Continuar' : '▶ Iniciar';
    elPhase.textContent = pomo.remaining < pomo.duration ? mode.label + " en pausa" : "Listo para empezar";
    elFocus.classList.remove('visible');
  }
  // dots
  const dots = elDots.querySelectorAll('.pomo-dot');
  dots.forEach((d,i)=> d.classList.toggle('done', i < pomo.sessions));
  elCount.textContent = `${pomo.sessions}/${pomo.maxSessions}`;
}

function startPomo(){
  if(pomo.running){ pausePomo(); return; }
  pomo.running = true;
  pomo.interval = setInterval(()=>{
    pomo.remaining--;
    if(pomo.remaining <= 0){
      pomo.remaining = 0;
      clearInterval(pomo.interval);
      pomo.running = false;
      if(pomo.mode==='study'){ pomo.sessions = Math.min(pomo.sessions+1, pomo.maxSessions); }
      renderPomo();
      playDone();
      setTimeout(()=>{
        alert(pomo.mode==='study' ? '🎉 ¡Sesión completada! Tomá un descanso.' : '✅ ¡Descanso terminado! A estudiar.');
      },100);
      return;
    }
    renderPomo();
  },1000);
  renderPomo();
}

function pausePomo(){
  pomo.running = false;
  clearInterval(pomo.interval);
  renderPomo();
}

function resetPomo(){
  pausePomo();
  pomo.remaining = pomo.duration;
  renderPomo();
}

function setMode(mode){
  pausePomo();
  pomo.mode = mode;
  const m = MODES[mode];
  pomo.duration  = m.default * 60;
  pomo.remaining = pomo.duration;
  setGradient(mode);
  renderDurButtons(mode);
  document.querySelectorAll('.pomo-mode-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.mode===mode);
  });
  renderPomo();
}

function renderDurButtons(mode){
  const m = MODES[mode];
  elDurRow.innerHTML = `<span class="pomo-dur-label">Duración</span>` +
    m.durations.map(d=>`<button class="pomo-dur-btn ${d===m.default?'active':''}" data-min="${d}">${d} min</button>`).join('');
  elDurRow.querySelectorAll('.pomo-dur-btn').forEach(b=>{
    b.onclick=()=>{
      const mins = parseInt(b.dataset.min);
      pausePomo();
      pomo.duration  = mins * 60;
      pomo.remaining = pomo.duration;
      MODES[pomo.mode].default = mins;
      elDurRow.querySelectorAll('.pomo-dur-btn').forEach(x=>x.classList.toggle('active',x===b));
      renderPomo();
    };
  });
}

elStart.onclick = startPomo;
elReset.onclick = resetPomo;
document.querySelectorAll('.pomo-mode-btn').forEach(b=>{
  b.onclick = ()=> setMode(b.dataset.mode);
});

async function loadDay(dk){

    const { data,error } = await db.from("journal_entries").select("data").eq("day_key",dk).maybeSingle();

let saveTimer;
async function persistDay(dk){
  cache[dk]=JSON.parse(JSON.stringify(dayData)); saveCache();

  saveTimer=setTimeout(async()=>{
    if(!userId) return;
    setSyncBadge("loading","guardando…");

      const { error }=await db.from("journal_entries").upsert(
        { user_id:userId,day_key:dk,data:dayData,updated_at:new Date().toISOString() },

      setSyncBadge("ok","sincronizado"); showSaveInd(); renderCal();

async function loadMonthEntries(year,month){
  if(!userId) return;
  const from=`${year}-${String(month+1).padStart(2,"0")}-01`;
  const to=`${year}-${String(month+1).padStart(2,"0")}-${new Date(year,month+1,0).getDate()}`;
  try {
    const { data }=await db.from("journal_entries").select("day_key").eq("user_id",userId).gte("day_key",from).lte("day_key",to);
    monthEntries={};
    (data||[]).forEach(r=>monthEntries[r.day_key]=true);
  } catch(e){ console.error("loadMonthEntries:",e); }
}

function hasEntry(dk){ return !!(monthEntries[dk]||cache[dk]); }

const DOW_ES=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

function renderCal(){
  document.getElementById("calMonthLbl").textContent=`${MONTHS_ES[calMonth]} ${calYear}`;
  const first=new Date(calYear,calMonth,1);
  let dow=first.getDay(); dow=dow===0?6:dow-1;
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const dip=new Date(calYear,calMonth,0).getDate();
  let html="";
  for(let i=dow-1;i>=0;i--) html+=`<div class="cal-day other-month">${dip-i}</div>`;
  for(let d=1;d<=dim;d++){
    const dt=new Date(calYear,calMonth,d); const dk=dayKey(dt);
    const isToday=dt.getTime()===today.getTime(); const isSel=dt.getTime()===selDate.getTime();
    let cls="cal-day"; if(isToday)cls+=" today"; if(isSel)cls+=" selected"; if(hasEntry(dk))cls+=" has-entry";
    html+=`<div class="${cls}" onclick="selectDay(new Date(${calYear},${calMonth},${d}))">${d}</div>`;
  }
  const total=dow+dim; const rem=total%7===0?0:7-(total%7);
  for(let d=1;d<=rem;d++) html+=`<div class="cal-day other-month">${d}</div>`;
  document.getElementById("calDays").innerHTML=html;
  const wd=DOW_ES[selDate.getDay()===0?6:selDate.getDay()-1];
  document.getElementById("hdrDate").textContent=`${wd}, ${selDate.getDate()} de ${MONTHS_ES[selDate.getMonth()]} ${selDate.getFullYear()}`;
}

async function shiftMonth(d){
  calMonth+=d; if(calMonth>11){calMonth=0;calYear++;}else if(calMonth<0){calMonth=11;calYear--;}
  await loadMonthEntries(calYear,calMonth); renderCal();
}

async function selectDay(dt){
  selDate=new Date(dt); selDate.setHours(0,0,0,0);
  calYear=selDate.getFullYear(); calMonth=selDate.getMonth();
  renderCal(); await loadDay(dayKey(selDate)); renderJournal();

      <div class="am2-blk-head"><span class="am2-blk-num">Bloque ${i+1}</span><span class="am2-blk-time">${times[i]}</span></div>
      <div class="am2-fields">
        <div class="am2-field" style="grid-column:1/-1;border-bottom:1px solid var(--border)">
          <div class="am2-field-lbl">Tema / ejercicios</div>
          <textarea id="am2-${i}-what" placeholder="¿Qué trabajaste?">${esc(dayData.am2[i].what)}</textarea>
        </div>
        <div class="am2-field"><div class="am2-field-lbl">✅ Lo que entró</div>
          <textarea id="am2-${i}-in" placeholder="Lo que quedó claro…">${esc(dayData.am2[i].in)}</textarea></div>
        <div class="am2-field"><div class="am2-field-lbl">❌ Lo que no entró</div>
          <textarea id="am2-${i}-out" placeholder="Dudas, trabas…">${esc(dayData.am2[i].out)}</textarea></div>
      </div></div>`).join("");
  return `<div class="jcard">
    <div class="jcard-head">
      <div class="jcard-icon" style="background:rgba(96,165,250,.1);color:var(--blue);font-size:14px;font-weight:700">∫∫</div>
      <div><div class="jcard-title">Log AM2 — 3 bloques</div><div class="jcard-sub">Qué hice, qué entró, qué no</div></div>
    </div>
    <div class="jcard-body"><div class="am2-blocks">${blocks}</div></div></div>`;}

function cardErrores(dk){
  const items=(dayData.errors||[]).map((e,i)=>`
    <div class="err-item">
      <span class="err-num">${String(i+1).padStart(2,"0")}</span>
      <textarea class="err-txt" data-idx="${i}" rows="2" placeholder="Describí el error y por qué ocurrió…">${esc(e)}</textarea>
      <span class="err-del" onclick="delError('${dk}',${i})">×</span>
    </div>`).join("");
  return `<div class="jcard">
    <div class="jcard-head">
      <div class="jcard-icon" style="background:rgba(248,113,113,.1);font-size:15px">🔍</div>
      <div><div class="jcard-title">Errores y aprendizajes</div><div class="jcard-sub">Lo que falló hoy → para no repetirlo</div></div>
    </div>
    <div class="jcard-body">
      <div class="err-list">${items}</div>
      <button class="add-btn" onclick="addError('${dk}')">+ agregar error</button>
    </div></div>`;}

function cardHabitos(dk){
  const done=HABITS.filter(h=>(dayData.habits||{})[h.id]).length;
  const pct=Math.round((done/HABITS.length)*100);
  const rows=HABITS.map(h=>{
    const d=!!(dayData.habits||{})[h.id];
    return `<div class="habit-row">
      <div class="habit-check ${d?"done":""}" data-hid="${h.id}"></div>
      <span class="habit-name ${d?"done":""}">${h.name}</span>
      <span class="habit-tag" style="color:${h.tagColor};background:${h.tagBg}">${h.tag}</span>
    </div>`;}).join("");
  return `<div class="jcard">
    <div class="jcard-head">
      <div class="jcard-icon" style="background:rgba(52,211,153,.1);font-size:15px">✔</div>
      <div style="flex:1"><div class="jcard-title">Checklist de hábitos</div><div class="jcard-sub">${done} de ${HABITS.length} · ${pct}%</div></div>
      <div style="font-size:18px;font-weight:600;color:${pct===100?'var(--teal)':'var(--dim)'}">${pct}%</div>
    </div>
    <div class="jcard-body"><div class="habit-list">${rows}</div></div></div>`;}

function cardReflexion(){
  return `<div class="jcard">
    <div class="jcard-head">
      <div class="jcard-icon" style="background:rgba(167,139,250,.1);font-size:15px">🌙</div>
      <div><div class="jcard-title">Reflexión nocturna</div><div class="jcard-sub">¿Cómo fue el día? ¿Qué rescatás?</div></div>
    </div>
    <div class="jcard-body">
      <textarea id="reflection-area" class="reflection-area" rows="5" placeholder="Escribí libremente… qué salió bien, qué cambiarías, cómo te sentiste estudiando…">${esc(dayData.reflection)}</textarea>
      <div class="char-count" id="char-count">0 caracteres</div>
    </div></div>`;}

function addError(dk){ if(!dayData.errors)dayData.errors=[]; dayData.errors.push(""); persistDay(dk); renderJournal(); }
function delError(dk,i){ dayData.errors.splice(i,1); persistDay(dk); renderJournal(); }

// ── INIT ──
(async()=>{
  renderCal();
  await initAuth();
  await loadMonthEntries(calYear,calMonth);
  await loadDay(dayKey(selDate));
  renderJournal();
  renderCal();
})();
</script>
</body>
</html>
