<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinel STRATOS — Journal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf8f4;--paper:#fff;--border:#e8e4dc;--border2:#d6d0c4;
  --text:#1a1814;--muted:#7a7468;--dim:#b8b2a8;--faint:#f0ede7;
  --am2:#4f46e5;--am2l:#ede9fe;--am2b:#c4b5fd;
  --gym:#059669;--gyml:#d1fae5;
  --err:#b45309;--errl:#fef3c7;--errb:#fcd34d;
  --nightl:#f5f3ff;--energyl:#fee2e2;
  --habit:#0369a1;--habitl:#e0f2fe;
  --radius:6px;--shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,#c8c0b0 1px,transparent 1px);background-size:28px 28px;opacity:.25;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 20px 80px}

/* HEADER */
.hdr{padding:40px 0 28px;border-bottom:1.5px solid var(--border2);margin-bottom:32px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hdr-brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:36px;height:36px;background:var(--am2);border-radius:4px;display:flex;align-items:center;justify-content:center}
.brand-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}
.brand-text h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.01em;color:var(--text)}
.brand-text p{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hdr-date{font-family:'Lora',serif;font-size:13px;color:var(--muted);font-style:italic}
.sync-badge{font-size:10px;padding:3px 10px;border-radius:10px;letter-spacing:.06em}
.sync-badge.ok{background:var(--gyml);color:var(--gym)}
.sync-badge.err{background:var(--errl);color:var(--err)}
.sync-badge.loading{background:var(--faint);color:var(--muted)}

/* LAYOUT */
.layout{display:grid;grid-template-columns:260px 1fr;gap:24px;align-items:start}
@media(max-width:760px){.layout{grid-template-columns:1fr}}

/* CALENDAR */
.cal-wrap{background:var(--paper);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;position:sticky;top:24px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid var(--border)}
.cal-nav-btn{background:none;border:1px solid var(--border2);color:var(--muted);cursor:pointer;width:28px;height:28px;border-radius:3px;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{background:var(--faint);color:var(--text)}
.cal-month-lbl{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.cal-grid{padding:12px 14px 16px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px}
.cal-dow span{text-align:center;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);padding:4px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:3px;cursor:pointer;color:var(--muted);transition:all .15s;position:relative;border:1px solid transparent}
.cal-day:hover{background:var(--faint);color:var(--text)}
.cal-day.other-month{color:var(--dim);opacity:.4}
.cal-day.today{font-weight:500;color:var(--am2);border-color:var(--am2b);background:var(--am2l)}
.cal-day.selected{background:var(--am2);color:#fff;border-color:var(--am2)}
.cal-day.has-entry::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--gym)}
.cal-day.selected::after{background:rgba(255,255,255,.7)}
.cal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:14px;flex-wrap:wrap}
.cal-leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.cal-dot{width:6px;height:6px;border-radius:50%}

/* CARDS */
.journal{display:flex;flex-direction:column;gap:20px}
.jcard{background:var(--paper);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:fu .2s ease both}
.jcard:nth-child(2){animation-delay:.04s}.jcard:nth-child(3){animation-delay:.08s}
.jcard:nth-child(4){animation-delay:.12s}.jcard:nth-child(5){animation-delay:.16s}.jcard:nth-child(6){animation-delay:.2s}
.jcard-head{display:flex;align-items:center;gap:10px;padding:15px 20px 12px;border-bottom:1px solid var(--border)}
.jcard-icon{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.jcard-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text)}
.jcard-sub{font-size:10px;color:var(--dim);margin-top:1px}
.jcard-body{padding:18px 20px}

/* INTENTION */
.intention-input{width:100%;font-family:'Lora',serif;font-size:18px;font-style:italic;color:var(--text);background:transparent;border:none;outline:none;resize:none;line-height:1.65;min-height:52px}
.intention-input::placeholder{color:var(--dim)}
.intention-rule{height:1.5px;background:var(--border2);margin-top:10px;border-radius:1px;overflow:hidden}
.intention-fill{height:100%;background:var(--am2);border-radius:1px;transition:width .4s ease}

/* ENERGY */
.energy-wrap{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.energy-btn{padding:6px 14px;border:1.5px solid var(--border2);border-radius:20px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--bg);cursor:pointer;transition:all .15s}
.energy-btn.on[data-v="1"]{color:#dc2626;background:#fee2e2;border-color:#dc2626}
.energy-btn.on[data-v="2"]{color:#d97706;background:#fef3c7;border-color:#d97706}
.energy-btn.on[data-v="3"]{color:#059669;background:#d1fae5;border-color:#059669}
.energy-btn.on[data-v="4"]{color:#2563eb;background:#dbeafe;border-color:#2563eb}
.energy-btn.on[data-v="5"]{color:#7c3aed;background:#f5f3ff;border-color:#7c3aed}
.energy-note{width:100%;margin-top:12px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);background:var(--faint);border:1px solid var(--border);border-radius:4px;padding:9px 12px;resize:none;outline:none;line-height:1.6;min-height:48px}
.energy-note::placeholder{color:var(--dim)}
.energy-note:focus{border-color:var(--am2b)}

/* AM2 */
.am2-blocks{display:flex;flex-direction:column;gap:12px}
.am2-blk{border:1.5px solid var(--border);border-radius:4px;overflow:hidden}
.am2-blk-head{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--am2l);border-bottom:1px solid var(--am2b)}
.am2-blk-num{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--am2);letter-spacing:.08em}
.am2-blk-time{font-size:10px;color:var(--am2);opacity:.7;margin-left:auto}
.am2-fields{display:grid;grid-template-columns:1fr 1fr}
.am2-field{padding:10px 14px;border-right:1px solid var(--border)}
.am2-field:last-child{border-right:none}
.am2-field-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.am2-field textarea{width:100%;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);background:transparent;border:none;outline:none;resize:none;line-height:1.6;min-height:52px}
.am2-field textarea::placeholder{color:var(--dim)}
@media(max-width:520px){.am2-fields{grid-template-columns:1fr}.am2-field{border-right:none;border-bottom:1px solid var(--border)}.am2-field:last-child{border-bottom:none}}

/* ERRORS */
.err-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.err-item{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--errl);border:1px solid var(--errb);border-radius:4px}
.err-num{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--errb);flex-shrink:0;line-height:1.1}
.err-txt{flex:1;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);background:transparent;border:none;outline:none;resize:none;line-height:1.6;min-height:36px}
.err-txt::placeholder{color:#b45309;opacity:.5}
.err-del{font-size:16px;color:var(--errb);cursor:pointer;flex-shrink:0;line-height:1;padding:0 3px;transition:color .15s}
.err-del:hover{color:var(--err)}
.add-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:1.5px dashed var(--border2);border-radius:3px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:transparent;cursor:pointer;letter-spacing:.05em;transition:all .15s}
.add-btn:hover{border-color:var(--err);color:var(--err)}

/* HABITS */
.habit-list{display:flex;flex-direction:column;gap:6px}
.habit-row{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:4px;transition:background .1s}
.habit-row:hover{background:var(--faint)}
.habit-check{width:18px;height:18px;border:2px solid var(--border2);border-radius:3px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.habit-check.done{background:var(--habit);border-color:var(--habit)}
.habit-check.done::after{content:'✓';font-size:11px;color:#fff;font-weight:700}
.habit-name{font-size:13px;color:var(--text);flex:1}
.habit-name.done{text-decoration:line-through;color:var(--dim)}
.habit-tag{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:10px}

/* REFLECTION */
.reflection-area{width:100%;font-family:'Lora',serif;font-size:14px;color:var(--text);background:transparent;border:none;outline:none;resize:none;line-height:1.85;min-height:120px}
.reflection-area::placeholder{color:var(--dim);font-style:italic}
.char-count{font-size:10px;color:var(--dim);text-align:right;margin-top:8px}

/* SAVE */
.save-ind{position:fixed;bottom:24px;right:24px;padding:8px 16px;background:var(--text);color:var(--bg);font-size:11px;border-radius:3px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;letter-spacing:.05em}
.save-ind.show{opacity:1}

@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="app">

<header class="hdr">
  <div class="hdr-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="brand-text">
      <h1>Sentinel STRATOS</h1>
      <p>Journal diario</p>
    </div>
  </div>
  <div class="hdr-right">
    <div class="hdr-date" id="hdrDate"></div>
    <div class="sync-badge loading" id="syncBadge">conectando…</div>
  </div>
</header>

<div class="layout">
  <div>
    <div class="cal-wrap">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="shiftMonth(-1)">‹</button>
        <span class="cal-month-lbl" id="calMonthLbl"></span>
        <button class="cal-nav-btn" onclick="shiftMonth(1)">›</button>
      </div>
      <div class="cal-grid">
        <div class="cal-dow"><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span><span>D</span></div>
        <div class="cal-days" id="calDays"></div>
      </div>
      <div class="cal-footer">
        <div class="cal-leg"><div class="cal-dot" style="background:var(--am2)"></div>hoy</div>
        <div class="cal-leg"><div class="cal-dot" style="background:var(--gym)"></div>con entrada</div>
      </div>
    </div>
  </div>

  <div class="journal" id="journal">
    <div style="text-align:center;padding:60px 24px;color:var(--muted);font-family:'Lora',serif;font-style:italic;font-size:15px;">
      Conectando con Supabase…
    </div>
  </div>
</div>
</div>

<div class="save-ind" id="saveInd">sincronizado ✓</div>

<script>
// ─── REEMPLAZÁ ESTOS DOS VALORES ─────────────────────────────────────────────
const SUPABASE_URL  = "https://daphnirwtfzxlcvnyowh.supabase.co"
;
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhcGhuaXJ3dGZ6eGxjdm55b3doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NTU1MTYsImV4cCI6MjA5NDAzMTUxNn0.oMXI1RkWkcggrDYtyaYr4cNwgecbApWQQyLGeEKb0RI";
// ─────────────────────────────────────────────────────────────────────────────

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

let userId = null;

async function initAuth() {
  setSyncBadge("loading","conectando…");
  try {
    const { data:{ session } } = await db.auth.getSession();
    if (session) { userId = session.user.id; }
    else {
      const { data, error } = await db.auth.signInAnonymously();
      if (error) throw error;
      userId = data.user.id;
    }
    setSyncBadge("ok","sincronizado");
  } catch(e) {
    console.error("Auth error:",e);
    setSyncBadge("err","sin conexión");
    userId = null;
  }
}

function setSyncBadge(type,txt){
  const b=document.getElementById("syncBadge");
  b.className="sync-badge "+type; b.textContent=txt;
}

// Cache local como respaldo
const CACHE_KEY="stratos_cache_v2";
let cache={};
try{ cache=JSON.parse(localStorage.getItem(CACHE_KEY))||{}; }catch(e){ cache={}; }
function saveCache(){ try{ localStorage.setItem(CACHE_KEY,JSON.stringify(cache)); }catch(e){} }

let dayData={};
let monthEntries={};

function emptyDay(){
  return { intention:"",energy:0,energyNote:"",
    am2:[{what:"",in:"",out:""},{what:"",in:"",out:""},{what:"",in:"",out:""}],
    errors:[],habits:{},reflection:"" };
}

async function loadDay(dk){
  dayData = cache[dk] ? JSON.parse(JSON.stringify(cache[dk])) : emptyDay();
  if(!userId) return;
  try {
    const { data,error } = await db.from("journal_entries").select("data").eq("day_key",dk).maybeSingle();
    if(error) throw error;
    if(data){ dayData={...emptyDay(),...data.data}; cache[dk]=JSON.parse(JSON.stringify(dayData)); saveCache(); }
  } catch(e){ console.error("loadDay:",e); setSyncBadge("err","error al cargar"); }
}

let saveTimer;
async function persistDay(dk){
  cache[dk]=JSON.parse(JSON.stringify(dayData)); saveCache();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    if(!userId) return;
    setSyncBadge("loading","guardando…");
    try {
      const { error }=await db.from("journal_entries").upsert(
        { user_id:userId,day_key:dk,data:dayData,updated_at:new Date().toISOString() },
        { onConflict:"user_id,day_key" }
      );
      if(error) throw error;
      setSyncBadge("ok","sincronizado"); showSaveInd(); renderCal();
    } catch(e){ console.error("persistDay:",e); setSyncBadge("err","error al guardar"); }
  },800);
}

async function loadMonthEntries(year,month){
  if(!userId) return;
  const from=`${year}-${String(month+1).padStart(2,"0")}-01`;
  const to=`${year}-${String(month+1).padStart(2,"0")}-${new Date(year,month+1,0).getDate()}`;
  try {
    const { data }=await db.from("journal_entries").select("day_key").eq("user_id",userId).gte("day_key",from).lte("day_key",to);
    monthEntries={};
    (data||[]).forEach(r=>monthEntries[r.day_key]=true);
  } catch(e){ console.error("loadMonthEntries:",e); }
}

function hasEntry(dk){ return !!(monthEntries[dk]||cache[dk]); }
function dayKey(d){ return d.toISOString().slice(0,10); }
function showSaveInd(){ const i=document.getElementById("saveInd"); i.classList.add("show"); setTimeout(()=>i.classList.remove("show"),1800); }

// ── CALENDAR ──────────────────────────────────────────────────────────────────
const today=new Date(); today.setHours(0,0,0,0);
let selDate=new Date(today);
let calYear=today.getFullYear(), calMonth=today.getMonth();
const MONTHS_ES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DOW_ES=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

function renderCal(){
  document.getElementById("calMonthLbl").textContent=`${MONTHS_ES[calMonth]} ${calYear}`;
  const first=new Date(calYear,calMonth,1);
  let dow=first.getDay(); dow=dow===0?6:dow-1;
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const dip=new Date(calYear,calMonth,0).getDate();
  let html="";
  for(let i=dow-1;i>=0;i--) html+=`<div class="cal-day other-month">${dip-i}</div>`;
  for(let d=1;d<=dim;d++){
    const dt=new Date(calYear,calMonth,d); const dk=dayKey(dt);
    const isToday=dt.getTime()===today.getTime(); const isSel=dt.getTime()===selDate.getTime();
    let cls="cal-day"; if(isToday)cls+=" today"; if(isSel)cls+=" selected"; if(hasEntry(dk))cls+=" has-entry";
    html+=`<div class="${cls}" onclick="selectDay(new Date(${calYear},${calMonth},${d}))">${d}</div>`;
  }
  const total=dow+dim; const rem=total%7===0?0:7-(total%7);
  for(let d=1;d<=rem;d++) html+=`<div class="cal-day other-month">${d}</div>`;
  document.getElementById("calDays").innerHTML=html;
  const wd=DOW_ES[selDate.getDay()===0?6:selDate.getDay()-1];
  document.getElementById("hdrDate").textContent=`${wd}, ${selDate.getDate()} de ${MONTHS_ES[selDate.getMonth()]} ${selDate.getFullYear()}`;
}

async function shiftMonth(d){
  calMonth+=d; if(calMonth>11){calMonth=0;calYear++;}else if(calMonth<0){calMonth=11;calYear--;}
  await loadMonthEntries(calYear,calMonth); renderCal();
}

async function selectDay(dt){
  selDate=new Date(dt); selDate.setHours(0,0,0,0);
  calYear=selDate.getFullYear(); calMonth=selDate.getMonth();
  renderCal(); await loadDay(dayKey(selDate)); renderJournal();
}

// ── HABITS ────────────────────────────────────────────────────────────────────
const HABITS=[
  {id:"am2",    name:"3 bloques AM2 completados",   tag:"estudio",tagColor:"var(--am2)",  tagBg:"var(--am2l)"},
  {id:"gym",    name:"Entrenamiento (17:00–18:30)", tag:"físico", tagColor:"var(--gym)",  tagBg:"var(--gyml)"},
  {id:"repaso", name:"Repaso nocturno AM2",          tag:"estudio",tagColor:"var(--am2)",  tagBg:"var(--am2l)"},
  {id:"errores",name:"Anoté errores del día",        tag:"meta",   tagColor:"var(--err)",  tagBg:"var(--errl)"},
  {id:"levante",name:"Me levanté a las 9:00",        tag:"hábito", tagColor:"var(--habit)",tagBg:"var(--habitl)"},
  {id:"agua",   name:"Tomé suficiente agua",          tag:"salud",  tagColor:"var(--gym)",  tagBg:"var(--gyml)"},
];

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderJournal(){
  const dk=dayKey(selDate);
  document.getElementById("journal").innerHTML=
    cardIntencion()+cardEnergia()+cardAM2()+cardErrores(dk)+cardHabitos(dk)+cardReflexion();

  const intentEl=document.getElementById("intention-input");
  if(intentEl){ intentEl.oninput=()=>{ dayData.intention=intentEl.value; updateIntentionFill(); persistDay(dk); }; updateIntentionFill(); }

  document.querySelectorAll(".energy-btn").forEach(btn=>{
    btn.classList.toggle("on",parseInt(btn.dataset.v)===dayData.energy);
    btn.onclick=()=>{ dayData.energy=parseInt(btn.dataset.v); persistDay(dk); renderJournal(); };
  });

  const enEl=document.getElementById("energy-note");
  if(enEl) enEl.oninput=()=>{ dayData.energyNote=enEl.value; persistDay(dk); };

  [0,1,2].forEach(i=>{ ["what","in","out"].forEach(f=>{
    const el=document.getElementById(`am2-${i}-${f}`);
    if(el) el.oninput=()=>{ dayData.am2[i][f]=el.value; persistDay(dk); };
  }); });

  document.querySelectorAll(".err-txt").forEach(el=>{
    el.oninput=()=>{ dayData.errors[parseInt(el.dataset.idx)]=el.value; persistDay(dk); };
  });

  document.querySelectorAll(".habit-check").forEach(el=>{
    el.onclick=()=>{ const h=el.dataset.hid; dayData.habits[h]=!dayData.habits[h]; persistDay(dk); renderJournal(); };
  });

  const refEl=document.getElementById("reflection-area");
  if(refEl){ refEl.oninput=()=>{ dayData.reflection=refEl.value; updateCharCount(); persistDay(dk); }; updateCharCount(); }
}

function updateIntentionFill(){
  const el=document.getElementById("intention-input"); const fill=document.getElementById("intention-fill");
  if(!el||!fill) return; fill.style.width=Math.min(100,(el.value.length/120)*100)+"%";
}
function updateCharCount(){
  const el=document.getElementById("reflection-area"); const cc=document.getElementById("char-count");
  if(el&&cc) cc.textContent=el.value.length+" caracteres";
}

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── CARD TEMPLATES ────────────────────────────────────────────────────────────
function cardIntencion(){
  return `<div class="jcard">
    <div class="jcard-head"><div class="jcard-icon" style="background:#fef3c7;font-size:16px">🌅</div>
      <div><div class="jcard-title">Intención del día</div><div class="jcard-sub">¿Con qué energía arrancás hoy?</div></div></div>
    <div class="jcard-body">
      <textarea id="intention-input" class="intention-input" rows="2" placeholder="Hoy me propongo…">${esc(dayData.intention)}</textarea>
      <div class="intention-rule"><div class="intention-fill" id="intention-fill" style="width:0%"></div></div>
    </div></div>`;}

function cardEnergia(){
  const labels={1:"💀 Pésimo",2:"😴 Bajo",3:"😐 Normal",4:"⚡ Bueno",5:"🔥 En llamas"};
  const btns=[1,2,3,4,5].map(v=>`<button class="energy-btn" data-v="${v}">${labels[v]}</button>`).join("");
  return `<div class="jcard">
    <div class="jcard-head"><div class="jcard-icon" style="background:var(--energyl);font-size:16px">⚡</div>
      <div><div class="jcard-title">Estado físico / energía</div><div class="jcard-sub">¿Cómo llegás al día?</div></div></div>
    <div class="jcard-body">
      <div class="energy-wrap">${btns}</div>
      <textarea id="energy-note" class="energy-note" rows="2" placeholder="Dormiste bien, te duele algo, cómo está la cabeza…">${esc(dayData.energyNote)}</textarea>
    </div></div>`;}

function cardAM2(){
  const times=["09:30–10:20","10:30–11:20","11:30–12:20"];
  const blocks=[0,1,2].map(i=>`
    <div class="am2-blk">
      <div class="am2-blk-head"><span class="am2-blk-num">BLOQUE ${i+1}</span><span class="am2-blk-time">${times[i]}</span></div>
      <div class="am2-fields">
        <div class="am2-field" style="grid-column:1/-1;border-bottom:1px solid var(--border)">
          <div class="am2-field-lbl">Tema / ejercicios</div>
          <textarea id="am2-${i}-what" placeholder="¿Qué trabajaste?">${esc(dayData.am2[i].what)}</textarea>
        </div>
        <div class="am2-field"><div class="am2-field-lbl">✅ Lo que entró</div>
          <textarea id="am2-${i}-in" placeholder="Lo que quedó claro…">${esc(dayData.am2[i].in)}</textarea></div>
        <div class="am2-field"><div class="am2-field-lbl">❌ Lo que no entró</div>
          <textarea id="am2-${i}-out" placeholder="Dudas, trabas…">${esc(dayData.am2[i].out)}</textarea></div>
      </div></div>`).join("");
  return `<div class="jcard">
    <div class="jcard-head"><div class="jcard-icon" style="background:var(--am2l);color:var(--am2);font-size:15px;font-family:'Syne',sans-serif;font-weight:800">∫∫</div>
      <div><div class="jcard-title">Log AM2 — 3 bloques</div><div class="jcard-sub">Qué hice, qué entró, qué no</div></div></div>
    <div class="jcard-body"><div class="am2-blocks">${blocks}</div></div></div>`;}

function cardErrores(dk){
  const items=(dayData.errors||[]).map((e,i)=>`
    <div class="err-item">
      <span class="err-num">${String(i+1).padStart(2,"0")}</span>
      <textarea class="err-txt" data-idx="${i}" rows="2" placeholder="Describí el error y por qué ocurrió…">${esc(e)}</textarea>
      <span class="err-del" onclick="delError('${dk}',${i})">×</span>
    </div>`).join("");
  return `<div class="jcard">
    <div class="jcard-head"><div class="jcard-icon" style="background:var(--errl);font-size:16px">🔍</div>
      <div><div class="jcard-title">Errores y aprendizajes</div><div class="jcard-sub">Lo que falló hoy → para no repetirlo</div></div></div>
    <div class="jcard-body">
      <div class="err-list">${items}</div>
      <button class="add-btn" onclick="addError('${dk}')">+ agregar error</button>
    </div></div>`;}

function cardHabitos(dk){
  const done=HABITS.filter(h=>(dayData.habits||{})[h.id]).length;
  const pct=Math.round((done/HABITS.length)*100);
  const rows=HABITS.map(h=>{
    const d=!!(dayData.habits||{})[h.id];
    return `<div class="habit-row">
      <div class="habit-check ${d?"done":""}" data-hid="${h.id}"></div>
      <span class="habit-name ${d?"done":""}">${h.name}</span>
      <span class="habit-tag" style="color:${h.tagColor};background:${h.tagBg}">${h.tag}</span>
    </div>`;}).join("");
  return `<div class="jcard">
    <div class="jcard-head"><div class="jcard-icon" style="background:var(--habitl);font-size:16px">✔</div>
      <div style="flex:1"><div class="jcard-title">Checklist de hábitos</div><div class="jcard-sub">${done} de ${HABITS.length} · ${pct}%</div></div>
      <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:${pct===100?'var(--gym)':'var(--dim)'}">${pct}%</div></div>
    <div class="jcard-body"><div class="habit-list">${rows}</div></div></div>`;}

function cardReflexion(){
  return `<div class="jcard">
    <div class="jcard-head"><div class="jcard-icon" style="background:var(--nightl);font-size:16px">🌙</div>
      <div><div class="jcard-title">Reflexión nocturna</div><div class="jcard-sub">¿Cómo fue el día? ¿Qué rescatás?</div></div></div>
    <div class="jcard-body">
      <textarea id="reflection-area" class="reflection-area" rows="5" placeholder="Escribí libremente… qué salió bien, qué cambiarías, cómo te sentiste estudiando…">${esc(dayData.reflection)}</textarea>
      <div class="char-count" id="char-count">0 caracteres</div>
    </div></div>`;}

// ── ACCIONES ──────────────────────────────────────────────────────────────────
function addError(dk){ if(!dayData.errors)dayData.errors=[]; dayData.errors.push(""); persistDay(dk); renderJournal(); }
function delError(dk,i){ dayData.errors.splice(i,1); persistDay(dk); renderJournal(); }

// ── INIT ──────────────────────────────────────────────────────────────────────
(async()=>{
  renderCal();
  await initAuth();
  await loadMonthEntries(calYear,calMonth);
  await loadDay(dayKey(selDate));
  renderJournal();
  renderCal();
})();
</script>
</body>
</html>
